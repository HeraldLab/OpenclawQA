name: Validate QA runs

on:
  pull_request:
    paths:
      - 'runs/**'
      - 'scripts/**'
      - '.github/workflows/validate-run.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/validate-run.py
      - run: python -m unittest discover -s tests -p 'test_*.py'
