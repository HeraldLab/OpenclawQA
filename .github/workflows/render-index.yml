name: Render run index

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'runs/**'
      - 'scripts/render-index.py'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/render-index.py
      - run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: render run index"
            git push
          fi
