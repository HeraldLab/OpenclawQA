name: Tester report
description: Report manual QA results for an OpenClaw alpha/beta run.
title: "[Tester report]: "
labels:
  - status:needs-triage
body:
  - type: markdown
    attributes:
      value: |
        File one issue per bug. Keep answers concise, reproducible, and grounded in observed evidence.
        If a field cannot be answered from available evidence, write `NOT_ENOUGH_INFO`.
  - type: input
    id: target_tag
    attributes:
      label: Target tag
      placeholder: v2026.6.1-beta.1
    validations:
      required: true
  - type: dropdown
    id: result_type
    attributes:
      label: Result type
      options:
        - Passed requested scenario
        - Bug found
        - Blocked / could not complete
        - Needs clarification
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: macOS 26.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: input
    id: install_method
    attributes:
      label: Install or upgrade method
      placeholder: npm, pnpm, Homebrew, source checkout, Docker, other
    validations:
      required: true
  - type: textarea
    id: scenarios
    attributes:
      label: What did you test?
      description: List the requested scenarios or commands you actually ran.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / steps performed
      description: Provide exact steps. If this was a pass-only report, write the exact verification steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence links / uploads
      description: Screen recording, screenshots, logs, or public links. Note if raw evidence is private.
    validations:
      required: true
  - type: dropdown
    id: reproducible
    attributes:
      label: Can you reproduce it again?
      options:
        - Yes
        - No
        - Intermittent
        - NOT_ENOUGH_INFO
    validations:
      required: true
  - type: checkboxes
    id: permission
    attributes:
      label: Upstream filing
      options:
        - label: This report may be referenced in an upstream OpenClaw issue if validated.
          required: true
